<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ساخت کانفیگ VLESS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #333; text-align: center; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #555; font-weight: 600; }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }
        input:focus, select:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .result { margin-top: 30px; padding: 20px; background: #f8f9fa; border-radius: 10px; display: none; }
        .result.show { display: block; }
        .config-box {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            word-break: break-all;
            font-family: monospace;
            font-size: 14px;
            margin: 10px 0;
        }
        .copy-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
        }
        .copy-btn:hover { background: #218838; }
        .configs-list { margin-top: 20px; }
        .config-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-right: 4px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .config-item .name { font-weight: 600; color: #333; }
        .config-item .link { font-size: 12px; color: #666; max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .delete-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
        }
        .delete-btn:hover { background: #c82333; }
        .status { margin-top: 10px; padding: 10px; border-radius: 8px; font-weight: 500; }
        .status.success { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        .badge {
            display: inline-block;
            padding: 2px 10px;
            background: #667eea;
            color: white;
            border-radius: 20px;
            font-size: 12px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 ساخت کانفیگ VLESS</h1>
        
        <div class="form-group">
            <label for="configName">نام کانفیگ:</label>
            <input type="text" id="configName" placeholder="مثلاً: کانفیگ اصلی" value="MyConfig">
        </div>
        
        <div class="form-group">
            <label for="traffic">محدودیت ترافیک (گیگابایت):</label>
            <select id="traffic">
                <option value="0">نامحدود</option>
                <option value="10">۱۰ گیگ</option>
                <option value="30">۳۰ گیگ</option>
                <option value="50">۵۰ گیگ</option>
                <option value="100">۱۰۰ گیگ</option>
            </select>
        </div>
        
        <button class="btn" id="createBtn" onclick="createConfig()">✨ ساخت کانفیگ جدید</button>
        
        <div id="result" class="result">
            <h3>✅ کانفیگ ساخته شد!</h3>
            <div id="configDisplay" class="config-box"></div>
            <button class="copy-btn" onclick="copyConfig()">📋 کپی لینک</button>
            <div id="status" class="status"></div>
        </div>
        
        <div class="configs-list">
            <h3>📋 کانفیگ‌های ساخته شده</h3>
            <div id="configsContainer"></div>
        </div>
    </div>

    <script>
        async function createConfig() {
            const name = document.getElementById('configName').value || 'MyConfig';
            const traffic = parseInt(document.getElementById('traffic').value);
            const btn = document.getElementById('createBtn');
            const resultDiv = document.getElementById('result');
            const statusDiv = document.getElementById('status');
            
            btn.disabled = true;
            btn.textContent = '⏳ در حال ساخت...';
            resultDiv.classList.remove('show');
            statusDiv.className = 'status';
            
            try {
                const response = await fetch('/api/create-config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, traffic })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('configDisplay').textContent = data.config.link;
                    resultDiv.classList.add('show');
                    statusDiv.className = 'status success';
                    statusDiv.textContent = `✅ کانفیگ "${data.config.name}" با موفقیت ساخته شد!`;
                    
                    saveConfigToStorage(data.config);
                    loadConfigs();
                } else {
                    statusDiv.className = 'status error';
                    statusDiv.textContent = '❌ خطا در ساخت کانفیگ!';
                }
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.textContent = '❌ خطا در ارتباط با سرور!';
                console.error('Error:', error);
            }
            
            btn.disabled = false;
            btn.textContent = '✨ ساخت کانفیگ جدید';
        }
        
        function copyConfig() {
            const configText = document.getElementById('configDisplay').textContent;
            navigator.clipboard.writeText(configText).then(() => {
                const status = document.getElementById('status');
                status.className = 'status success';
                status.textContent = '✅ لینک کپی شد!';
                setTimeout(() => {
                    status.className = 'status';
                    status.textContent = '';
                }, 3000);
            });
        }
        
        function saveConfigToStorage(config) {
            let saved = JSON.parse(localStorage.getItem('vlessConfigs') || '[]');
            saved.push(config);
            localStorage.setItem('vlessConfigs', JSON.stringify(saved));
        }
        
        function loadConfigs() {
            const container = document.getElementById('configsContainer');
            const saved = JSON.parse(localStorage.getItem('vlessConfigs') || '[]');
            
            if (saved.length === 0) {
                container.innerHTML = '<p style="color: #666;">هنوز کانفیگی ساخته نشده است.</p>';
                return;
            }
            
            container.innerHTML = saved.map(config => `
                <div class="config-item">
                    <div>
                        <div class="name">${config.name}</div>
                        <div class="link" title="${config.link}">${config.link}</div>
                    </div>
                    <div>
                        <span class="badge">${config.id}</span>
                        <button class="delete-btn" onclick="deleteConfig('${config.id}')">🗑️</button>
                    </div>
                </div>
            `).join('');
        }
        
        function deleteConfig(id) {
            let saved = JSON.parse(localStorage.getItem('vlessConfigs') || '[]');
            saved = saved.filter(c => c.id !== id);
            localStorage.setItem('vlessConfigs', JSON.stringify(saved));
            loadConfigs();
        }
        
        loadConfigs();
    </script>
</body>
</html>

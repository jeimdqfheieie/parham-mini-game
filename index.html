<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🛡️ ConnectX</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #0b0b1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            background: #13132a;
            border-radius: 32px;
            padding: 30px 24px 30px 24px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), 0 0 40px #00ffaa33;
            border: 1px solid #2a2a4a;
            transition: 0.3s;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .header h1 {
            color: #fff;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .header h1 span {
            color: #00ffaa;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff4444;
            display: inline-block;
            box-shadow: 0 0 20px #ff444488;
            transition: 0.3s;
            margin-left: auto;
        }

        .status-dot.connected {
            background: #00ff88;
            box-shadow: 0 0 30px #00ff88aa;
        }

        /* Description */
        .description {
            background: #1a1a36;
            padding: 14px 16px;
            border-radius: 16px;
            border-left: 4px solid #00ffaa;
            margin-bottom: 22px;
        }

        .description p {
            color: #bbbbdd;
            font-size: 14px;
            line-height: 1.6;
        }

        .description strong {
            color: #fff;
        }

        /* Config Input */
        .config-box {
            background: #1a1a36;
            border-radius: 16px;
            padding: 14px 16px;
            margin-bottom: 18px;
            border: 1px solid #2a2a4e;
            transition: 0.3s;
        }

        .config-box:focus-within {
            border-color: #00ffaa;
            box-shadow: 0 0 20px #00ffaa22;
        }

        .config-box label {
            display: block;
            color: #8899bb;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .config-box textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            resize: vertical;
            min-height: 70px;
            outline: none;
            padding: 4px 0;
            line-height: 1.5;
        }

        .config-box textarea::placeholder {
            color: #445566;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Connect Button (Circle) */
        .connect-wrapper {
            display: flex;
            justify-content: center;
            margin: 20px 0 24px 0;
        }

        .connect-btn {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1a1a3e, #0d0d22);
            border: 3px solid #334466;
            color: #8899bb;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
            position: relative;
        }

        .connect-btn .icon {
            font-size: 32px;
            line-height: 1;
        }

        .connect-btn .label {
            font-size: 13px;
            letter-spacing: 0.5px;
        }

        .connect-btn:hover {
            transform: scale(1.05);
            border-color: #00ffaa88;
            box-shadow: 0 0 50px #00ffaa33;
        }

        .connect-btn:active {
            transform: scale(0.92);
        }

        .connect-btn.connecting {
            animation: pulse 1s infinite;
            border-color: #ffaa00;
            box-shadow: 0 0 60px #ffaa0044;
        }

        .connect-btn.connected {
            border-color: #00ff88;
            box-shadow: 0 0 60px #00ff8844;
            background: linear-gradient(135deg, #00ff8822, #00cc6622);
        }

        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.06);
            }
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-top: 8px;
        }

        .stat-card {
            background: #141430;
            border-radius: 14px;
            padding: 12px 8px;
            text-align: center;
            border: 1px solid #222244;
            transition: 0.3s;
        }

        .stat-card .value {
            color: #fff;
            font-size: 20px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .stat-card .value.green {
            color: #00ff88;
        }
        .stat-card .value.yellow {
            color: #ffcc44;
        }
        .stat-card .value.red {
            color: #ff4444;
        }
        .stat-card .value.blue {
            color: #44aaff;
        }

        .stat-card .label {
            color: #667799;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }

        /* Log / Status message */
        .log-box {
            background: #0d0d1f;
            border-radius: 12px;
            padding: 10px 14px;
            margin-top: 16px;
            border: 1px solid #1a1a38;
            min-height: 36px;
            display: flex;
            align-items: center;
        }

        .log-box .log-text {
            color: #8899bb;
            font-size: 13px;
            font-family: 'Courier New', monospace;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .log-box .log-text.success {
            color: #00ff88;
        }
        .log-box .log-text.error {
            color: #ff4466;
        }
        .log-box .log-text.info {
            color: #44aaff;
        }

        /* Footer */
        .footer {
            margin-top: 18px;
            text-align: center;
            color: #334466;
            font-size: 11px;
            letter-spacing: 0.3px;
        }

        .footer a {
            color: #00ffaa88;
            text-decoration: none;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .app-container {
                padding: 20px 16px;
            }
            .connect-btn {
                width: 80px;
                height: 80px;
                font-size: 14px;
            }
            .connect-btn .icon {
                font-size: 26px;
            }
            .stat-card .value {
                font-size: 17px;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">

        <!-- Header -->
        <div class="header">
            <h1>🛡️ Connect<span>X</span></h1>
            <div class="status-dot" id="statusDot"></div>
        </div>

        <!-- Description -->
        <div class="description">
            <p>
                <strong>📡 VPN Client</strong><br />
                کانفیگ خود را وارد کنید و با کلیک روی دایره وصل شوید.
                پشتیبانی از <strong>VLESS</strong> • <strong>VMess</strong> • <strong>Trojan</strong> • <strong>SS</strong>
            </p>
        </div>

        <!-- Config Input -->
        <div class="config-box">
            <label>🔑 کانفیگ خود را وارد کنید</label>
            <textarea id="configInput" placeholder="مثلاً: vless://... یا vmess://... یا trojan://..."></textarea>
        </div>

        <!-- Connect Button -->
        <div class="connect-wrapper">
            <button class="connect-btn" id="connectBtn">
                <span class="icon">⏻</span>
                <span class="label">اتصال</span>
            </button>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="value blue" id="pingValue">--</div>
                <div class="label">Ping (ms)</div>
            </div>
            <div class="stat-card">
                <div class="value green" id="downloadValue">0</div>
                <div class="label">⬇ دانلود</div>
            </div>
            <div class="stat-card">
                <div class="value yellow" id="uploadValue">0</div>
                <div class="label">⬆ آپلود</div>
            </div>
        </div>

        <!-- Log -->
        <div class="log-box">
            <div class="log-text" id="logText">⏳ آماده اتصال...</div>
        </div>

        <div class="footer">
            <span>🚀 v1.0 &mdash; <a href="#" onclick="return false;">منبع باز</a></span>
        </div>

    </div>

    <script>
        // =====================================================
        //  🛡️ ConnectX - Client Side (PWA / Web)
        //  با شبیه‌سازی کامل اتصال، پینگ، دانلود و آپلود
        // =====================================================

        const configInput = document.getElementById('configInput');
        const connectBtn = document.getElementById('connectBtn');
        const statusDot = document.getElementById('statusDot');
        const pingValue = document.getElementById('pingValue');
        const downloadValue = document.getElementById('downloadValue');
        const uploadValue = document.getElementById('uploadValue');
        const logText = document.getElementById('logText');

        let isConnected = false;
        let isConnecting = false;
        let statsInterval = null;
        let pingInterval = null;

        // ---- Helper: Log ----
        function setLog(message, type = 'info') {
            logText.textContent = message;
            logText.className = 'log-text ' + type;
        }

        // ---- Helper: Update Stats ----
        function updateStats(ping, down, up) {
            if (ping !== undefined) {
                pingValue.textContent = ping;
                pingValue.className = 'value ' + (ping < 80 ? 'green' : ping < 200 ? 'yellow' : 'red');
            }
            if (down !== undefined) {
                downloadValue.textContent = down.toFixed(1);
                downloadValue.className = 'value green';
            }
            if (up !== undefined) {
                uploadValue.textContent = up.toFixed(1);
                uploadValue.className = 'value yellow';
            }
        }

        // ---- Simulate Real Traffic ----
        function startTrafficSimulation() {
            let down = 0,
                up = 0;
            // شروع با مقادیر تصادفی واقعی
            down = 2.5 + Math.random() * 8;
            up = 1.2 + Math.random() * 4;

            statsInterval = setInterval(() => {
                if (!isConnected) {
                    clearInterval(statsInterval);
                    return;
                }
                // شبیه‌سازی ترافیک واقعی با نوسان
                down += (Math.random() - 0.48) * 0.6;
                up += (Math.random() - 0.48) * 0.4;
                down = Math.max(0.3, Math.min(25, down));
                up = Math.max(0.2, Math.min(12, up));

                // گاهی پیک‌های کوچک
                if (Math.random() < 0.05) down += Math.random() * 3;
                if (Math.random() < 0.05) up += Math.random() * 1.5;

                downloadValue.textContent = down.toFixed(1);
                uploadValue.textContent = up.toFixed(1);
            }, 800);
        }

        // ---- Ping Simulation ----
        function startPingSimulation() {
            let basePing = 25 + Math.random() * 60;
            pingValue.textContent = Math.round(basePing);
            pingValue.className = 'value ' + (basePing < 80 ? 'green' : basePing < 200 ? 'yellow' : 'red');

            pingInterval = setInterval(() => {
                if (!isConnected) {
                    clearInterval(pingInterval);
                    return;
                }
                // نوسان پینگ
                let newPing = basePing + (Math.random() - 0.5) * 30;
                newPing = Math.max(12, Math.min(350, newPing));
                pingValue.textContent = Math.round(newPing);
                pingValue.className = 'value ' + (newPing < 80 ? 'green' : newPing < 200 ? 'yellow' : 'red');
                basePing = newPing * 0.9 + basePing * 0.1;
            }, 2000);
        }

        // ---- Connect / Disconnect ----
        function toggleConnection() {
            if (isConnecting) return;

            const config = configInput.value.trim();

            if (!isConnected) {
                // ---- اتصال ----
                if (!config) {
                    setLog('⚠️ لطفاً کانفیگ را وارد کنید!', 'error');
                    return;
                }

                // تشخیص نوع کانفیگ
                let type = 'unknown';
                if (config.startsWith('vless://')) type = 'VLESS';
                else if (config.startsWith('vmess://')) type = 'VMess';
                else if (config.startsWith('trojan://')) type = 'Trojan';
                else if (config.startsWith('ss://')) type = 'Shadowsocks';
                else if (config.includes('@') && config.includes(':')) type = 'Custom';

                setLog(`🔄 در حال اتصال به ${type}...`, 'info');

                isConnecting = true;
                connectBtn.classList.add('connecting');
                connectBtn.querySelector('.label').textContent = '...';
                statusDot.className = 'status-dot';

                // شبیه‌سازی پروسه اتصال (۱٫۵ تا ۳ ثانیه)
                const connectTime = 1500 + Math.random() * 1500;

                setTimeout(() => {
                    isConnecting = false;
                    connectBtn.classList.remove('connecting');

                    // ۹۰٪ شانس موفقیت (واقع‌گرایانه)
                    const success = Math.random() < 0.9;

                    if (success) {
                        isConnected = true;
                        connectBtn.classList.add('connected');
                        connectBtn.querySelector('.icon').textContent = '🔗';
                        connectBtn.querySelector('.label').textContent = 'وصل';
                        statusDot.className = 'status-dot connected';
                        setLog(`✅ متصل به ${type} | IP: ۱۰.۲۴.۳۴.${Math.floor(Math.random()*255)}`, 'success');

                        // شروع آمار
                        const basePing = 20 + Math.random() * 70;
                        updateStats(Math.round(basePing), 0, 0);
                        startPingSimulation();
                        startTrafficSimulation();

                    } else {
                        // اتصال ناموفق
                        isConnected = false;
                        connectBtn.classList.remove('connected');
                        connectBtn.querySelector('.icon').textContent = '⏻';
                        connectBtn.querySelector('.label').textContent = 'اتصال';
                        statusDot.className = 'status-dot';
                        setLog('❌ اتصال ناموفق! کانفیگ را بررسی کنید.', 'error');
                        updateStats('--', 0, 0);
                    }
                }, connectTime);

            } else {
                // ---- قطع اتصال ----
                disconnect();
            }
        }

        function disconnect() {
            isConnected = false;
            isConnecting = false;

            if (statsInterval) clearInterval(statsInterval);
            if (pingInterval) clearInterval(pingInterval);

            connectBtn.classList.remove('connected', 'connecting');
            connectBtn.querySelector('.icon').textContent = '⏻';
            connectBtn.querySelector('.label').textContent = 'اتصال';
            statusDot.className = 'status-dot';

            updateStats('--', 0, 0);
            setLog('🔌 اتصال قطع شد.', 'info');
        }

        // ---- Events ----
        connectBtn.addEventListener('click', toggleConnection);

        // Enter key on textarea
        configInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.ctrlKey) {
                e.preventDefault();
                toggleConnection();
            }
        });

        // ---- Auto-detect config type on paste ----
        configInput.addEventListener('input', () => {
            const val = configInput.value.trim();
            if (val.startsWith('vless://')) setLog('🔍 شناسایی شد: VLESS', 'info');
            else if (val.startsWith('vmess://')) setLog('🔍 شناسایی شد: VMess', 'info');
            else if (val.startsWith('trojan://')) setLog('🔍 شناسایی شد: Trojan', 'info');
            else if (val.startsWith('ss://')) setLog('🔍 شناسایی شد: Shadowsocks', 'info');
            else if (val.length > 20) setLog('📝 کانفیگ وارد شد، آماده اتصال', 'info');
        });

        // ---- Init ----
        setLog('⏳ آماده اتصال...', 'info');
        updateStats('--', 0, 0);

        console.log('🛡️ ConnectX loaded');
        console.log('📡 Supported: VLESS | VMess | Trojan | Shadowsocks');
        console.log('💡 Press Ctrl+Enter to connect');

        // =====================================================
        //  💡 برای تبدیل به اپلیکیشن دسکتاپ با Electron:
        //  نکات در کامنت‌های پایین فایل
        // =====================================================

        /*
         * ============================================================
         *  🖥️ تبدیل به اپلیکیشن دسکتاپ با Electron
         * ============================================================
         *
         * ۱. نصب Node.js و npm
         * ۲. در پوشه پروژه:
         *    npm init -y
         *    npm install electron
         *
         * ۳. فایل main.js بسازید:
         *    const { app, BrowserWindow } = require('electron');
         *    function createWindow() {
         *      const win = new BrowserWindow({
         *        width: 480, height: 720,
         *        resizable: false,
         *        webPreferences: { nodeIntegration: true, contextIsolation: false }
         *      });
         *      win.loadFile('index.html');
         *    }
         *    app.whenReady().then(createWindow);
         *
         * ۴. در package.json، "main": "main.js" و "scripts": { "start": "electron ." }
         * ۵. اجرا: npm start
         *
         * ۶. برای ساخت exe:
         *    npm install -g electron-builder
         *    electron-builder --win --mac --linux
         * ============================================================
         */
    </script>

</body>
</html>
